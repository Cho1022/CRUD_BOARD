services:
  postgres:
    image: postgres:16-alpine
    container_name: board-app-postgres
    environment:
      POSTGRES_DB: board
      POSTGRES_USER: board
      POSTGRES_PASSWORD: board
    ports:
      - "5433:5432"
    volumes:
      - board-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U board -d board"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  board-postgres-data:
